<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Slither Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            pointer-events: none; text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

<div id="ui">
    <h2>Firebase Slither</h2>
    <p>Move your mouse to steer.</p>
</div>
<canvas id="gameCanvas"></canvas>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Your provided configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBuWWnqDX5mUra5pF3uuBxEVSKjcESifTk",
        authDomain: "gawynt-hub.firebaseapp.com",
        databaseURL: "https://gawynt-hub-default-rtdb.firebaseio.com",
        projectId: "gawynt-hub",
        storageBucket: "gawynt-hub.firebasestorage.app",
        messagingSenderId: "330651852035",
        appId: "1:330651852035:web:db931f867da21b6a519d36",
        measurementId: "G-XLXGTVSPXT"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const playerId = Math.floor(Math.random() * 1000000).toString();
    const playerRef = ref(db, `players/${playerId}`);

    // Game Constants & State
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
    let mySnake = {
        id: playerId,
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        segments: [],
        color: `hsl(${Math.random() * 360}, 70%, 50%)`,
        angle: 0
    };

    let allPlayers = {};

    // Input Handling
    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    // Remove player on disconnect
    onDisconnect(playerRef).remove();

    // Listen for other players
    const playersRef = ref(db, 'players');
    onValue(playersRef, (snapshot) => {
        allPlayers = snapshot.val() || {};
    });

    function update() {
        // 1. Calculate angle to mouse
        const dx = mouse.x - mySnake.x;
        const dy = mouse.y - mySnake.y;
        mySnake.angle = Math.atan2(dy, dx);

        // 2. Move head
        const speed = 3;
        mySnake.x += Math.cos(mySnake.angle) * speed;
        mySnake.y += Math.sin(mySnake.angle) * speed;

        // 3. Update segments (Snake Trail)
        mySnake.segments.unshift({ x: mySnake.x, y: mySnake.y });
        if (mySnake.segments.length > 20) {
            mySnake.segments.pop();
        }

        // 4. Sync to Firebase (Throttled via RequestAnimationFrame)
        set(playerRef, mySnake);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw grid background
        ctx.strokeStyle = '#222';
        for(let i=0; i<canvas.width; i+=50) {
            ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        for(let i=0; i<canvas.height; i+=50) {
            ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        // Draw all players
        Object.values(allPlayers).forEach(player => {
            if (!player.segments) return;

            ctx.fillStyle = player.color;
            player.segments.forEach((seg, index) => {
                const size = 10 - (index * 0.2); // Tapered tail
                ctx.beginPath();
                ctx.arc(seg.x, seg.y, Math.max(size, 3), 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Draw Head
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(player.x, player.y, 5, 0, Math.PI * 2);
            ctx.fill();
        });

        update();
        requestAnimationFrame(draw);
    }

    draw();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>
</body>
</html>
