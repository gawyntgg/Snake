<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Firebase Slither Multiplayer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            pointer-events: none; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px;
            z-index: 10; border: 1px solid #444;
        }
        .score { font-size: 24px; font-weight: bold; color: #4CAF50; }
    </style>
</head>
<body>

<div id="ui">
    <div class="score">Length: <span id="scoreVal">0</span></div>
    <div style="font-size: 11px; opacity: 0.8; margin-top: 5px;">Kill opponents to eat their remains!</div>
</div>

<canvas id="gameCanvas"></canvas>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, onDisconnect, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBuWWnqDX5mUra5pF3uuBxEVSKjcESifTk",
        authDomain: "gawynt-hub.firebaseapp.com",
        databaseURL: "https://gawynt-hub-default-rtdb.firebaseio.com",
        projectId: "gawynt-hub",
        storageBucket: "gawynt-hub.firebasestorage.app",
        messagingSenderId: "330651852035",
        appId: "1:330651852035:web:db931f867da21b6a519d36",
        measurementId: "G-XLXGTVSPXT"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const playerId = Math.floor(Math.random() * 1000000).toString();
    const playerRef = ref(db, `players/${playerId}`);
    const orbsRef = ref(db, 'orbs');

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let mySnake = {
        id: playerId,
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        segments: [],
        length: 20,
        color: `hsl(${Math.random() * 360}, 80%, 60%)`,
        angle: 0
    };

    let players = {};
    let orbs = {};
    let isAlive = true;
    let mouse = { x: canvas.width/2, y: canvas.height/2 };
    let touchStart = null;

    // --- INPUT ---
    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('touchstart', (e) => { touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; });
    window.addEventListener('touchmove', (e) => {
        if (!touchStart) return;
        const dx = e.touches[0].clientX - touchStart.x;
        const dy = e.touches[0].clientY - touchStart.y;
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) mySnake.angle = Math.atan2(dy, dx);
    });
    window.addEventListener('touchend', () => { touchStart = null; });

    // --- DATABASE ---
    onValue(orbsRef, (snap) => {
        orbs = snap.val() || {};
        if (Object.keys(orbs).length < 20) {
            const newOrb = push(orbsRef);
            set(newOrb, { x: Math.random() * canvas.width, y: Math.random() * canvas.height, value: 2, size: 4 });
        }
    });

    onValue(ref(db, 'players'), (snap) => players = snap.val() || {});
    onDisconnect(playerRef).remove();

    // --- COLLISION & DEATH ---
    function checkCollisions() {
        if (!isAlive) return;

        // 1. Eat Orbs
        Object.keys(orbs).forEach(key => {
            const orb = orbs[key];
            const dist = Math.hypot(mySnake.x - orb.x, mySnake.y - orb.y);
            if (dist < 20) {
                remove(ref(db, `orbs/${key}`));
                mySnake.length += (orb.value || 2); 
            }
        });

        // 2. Hit Opponent = Death
        Object.values(players).forEach(p => {
            if (p.id === playerId || !p.segments) return;
            p.segments.forEach((seg, index) => {
                // Skip the head for friendly passing, check body
                if (index < 3) return; 
                const dist = Math.hypot(mySnake.x - seg.x, mySnake.y - seg.y);
                if (dist < 12) die();
            });
        });
    }

    function die() {
        isAlive = false;
        // DROP REWARDS: Turn segments into orbs before deleting player
        mySnake.segments.forEach((seg, i) => {
            if (i % 3 === 0) { // Drop an orb every 3rd segment
                const newOrb = push(orbsRef);
                set(newOrb, { x: seg.x, y: seg.y, value: 5, size: 6, color: mySnake.color });
            }
        });
        
        remove(playerRef);
        alert("Game Over! You were eaten. Refresh to play again.");
    }

    function update() {
        if (!isAlive) return;

        if (!touchStart) {
            const dx = mouse.x - mySnake.x;
            const dy = mouse.y - mySnake.y;
            if (Math.hypot(dx, dy) > 10) mySnake.angle = Math.atan2(dy, dx);
        }

        mySnake.x += Math.cos(mySnake.angle) * 3;
        mySnake.y += Math.sin(mySnake.angle) * 3;

        mySnake.segments.unshift({ x: mySnake.x, y: mySnake.y });
        while (mySnake.segments.length > mySnake.length) mySnake.segments.pop();

        checkCollisions();
        set(playerRef, mySnake);
        document.getElementById('scoreVal').innerText = Math.floor(mySnake.length);
    }

    function draw() {
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Orbs
        Object.values(orbs).forEach(orb => {
            ctx.fillStyle = orb.color || '#fff';
            ctx.beginPath(); 
            ctx.arc(orb.x, orb.y, orb.size || 4, 0, Math.PI*2); 
            ctx.fill();
        });

        // Draw Snakes & Pointers
        Object.values(players).forEach(p => {
            if (!p.segments) return;
            
            // Draw Body
            ctx.fillStyle = p.color;
            p.segments.forEach((seg, i) => {
                ctx.beginPath();
                ctx.arc(seg.x, seg.y, Math.max(9 - (i * 0.05), 3), 0, Math.PI*2);
                ctx.fill();
            });

            // Opponent Arrows
            if (p.id !== playerId && isAlive) {
                const dx = p.x - mySnake.x;
                const dy = p.y - mySnake.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 180) {
                    const angle = Math.atan2(dy, dx);
                    const arrowX = mySnake.x + Math.cos(angle) * 80;
                    const arrowY = mySnake.y + Math.sin(angle) * 80;
                    ctx.save();
                    ctx.translate(arrowX, arrowY);
                    ctx.rotate(angle);
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.moveTo(12, 0); ctx.lineTo(-6, -7); ctx.lineTo(-6, 7);
                    ctx.closePath(); ctx.fill();
                    ctx.restore();
                }
            }
        });

        update();
        requestAnimationFrame(draw);
    }

    draw();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>
</body>
</html>
